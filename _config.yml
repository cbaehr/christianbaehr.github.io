title: "Christian Baehr"
description: "Ph.D. Candidate in Politics at Princeton University"
url: "https://christianbaehr.com"
baseurl: ""
repository: "cbaehr/christianbaehr.github.io"

remote_theme: "mmistakes/minimal-mistakes@4.26.2"

plugins:
  - jekyll-include-cache
  - jekyll-sitemap

# Optional: enable posts if you ever want them
# collections:
#   posts:
#     output: true

author:
  name: "Christian Baehr"
  email: "cbaehr@princeton.edu"

# Site defaults
defaults:
  - scope:
      path: ""
    values:
      layout: "single"

# Navigation (optional)
# navigation:
#   - title: "Home"
#     url: "/"
#   - title: "Research"
#     url: "/#research"
#   - title: "Teaching"
#     url: "/#teaching"

# Make Markdown behave nicely with HTML blocks
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

# Minimal Mistakes settings
minimal_mistakes_skin: "dark"

# If you want the .github.io URL to also work, keep url as the custom domain,
# GitHub Pages will redirect the .github.io URL to your custom domain once configured.
